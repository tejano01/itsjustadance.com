<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — It's Just A Dance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFB612; --bg: #0d0d0d; --border: #222; --text: #f0f0f0; --muted: #888; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(120px, 25vw, 200px);
      font-weight: 900;
      line-height: 1;
      color: var(--border);
      margin-bottom: 8px;
      letter-spacing: -8px;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      font-style: italic;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .body {
      font-size: 16px;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: var(--gold);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 32px;
      border-radius: 100px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,182,18,0.3); }
    .footer-note {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="number">404</div>
  <p class="title">Wrong floor.</p>
  <p class="body">This page doesn't exist — but your next dance partner might. Head back and find them.</p>
  <a class="btn" href="/">Take me home</a>
  <p class="footer-note">It's Just A Dance · itsjustadance.com</p>
</body>
</html>
